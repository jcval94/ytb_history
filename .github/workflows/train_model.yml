name: Train Model Suite

on:
  workflow_dispatch:
  schedule:
    - cron: '30 10 * * 1'

permissions:
  contents: write
  actions: read

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements.txt

      - name: Compile
        run: python -m compileall src tests

      - name: Run tests
        run: pytest -q

      - name: Build model dataset
        run: python -m ytb_history.cli build-model-dataset

      - name: Analyze model readiness
        run: python -m ytb_history.cli analyze-model-readiness

      - name: Smoke test model training
        run: |
          report_json="$(python -m ytb_history.cli smoke-test-model-training)"
          echo "$report_json"
          smoke_status="$(python -c 'import json,sys; print(json.load(sys.stdin).get("status", "unknown"))' <<< "$report_json")"
          if [ "$smoke_status" = "success" ] || [ "$smoke_status" = "skipped_missing_ml_dependencies" ]; then
            exit 0
          fi
          echo "Unexpected smoke-test-model-training status: $smoke_status"
          exit 1

      - name: Build NLP feature layer
        run: python -m ytb_history.cli build-nlp-features

      - name: Build topic intelligence
        run: python -m ytb_history.cli build-topic-intelligence

      - name: Train content driver models
        run: |
          report_json="$(python -m ytb_history.cli train-content-driver-models)"
          echo "$report_json"
          status="$(python -c 'import json,sys; print(json.load(sys.stdin).get("status", "unknown"))' <<< "$report_json")"
          if [ "$status" = "success" ] || [ "$status" = "skipped_not_ready" ] || [ "$status" = "skipped_missing_ml_dependencies" ]; then
            exit 0
          fi
          echo "Unexpected train-content-driver-models status: $status"
          exit 1

      - name: Model artifact registry report
        run: python -m ytb_history.cli model-artifact-registry-report

      - name: Train model suite
        id: train_suite
        run: |
          report_json="$(python -m ytb_history.cli train-model-suite)"
          echo "$report_json"
          train_status="$(python -c 'import json,sys; print(json.load(sys.stdin).get("status", "unknown"))' <<< "$report_json")"
          echo "train_status=$train_status" >> "$GITHUB_OUTPUT"

      - name: Upload model artifact
        if: steps.train_suite.outputs.train_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ytb-model-suite-${{ github.run_id }}
          path: build/model_artifact
          retention-days: 30

      - name: Register trained artifact
        if: steps.train_suite.outputs.train_status == 'success'
        run: |
          python -m ytb_history.cli register-trained-artifact \
            --artifact-name ytb-model-suite-${{ github.run_id }} \
            --workflow-run-id ${{ github.run_id }} \
            --artifact-dir build/model_artifact

      - name: Commit and push model registry updates
        if: steps.train_suite.outputs.train_status == 'success'
        run: |
          git config user.name "youtube-tracker-bot"
          git config user.email "youtube-tracker-bot@users.noreply.github.com"
          git add data/model_registry/ data/model_reports/ \
            data/modeling/latest_model_readiness_diagnostics.json \
            data/modeling/latest_model_readiness_timeline.csv \
            data/modeling/latest_target_coverage_report.csv \
            data/modeling/latest_training_gap_report.json \
            data/modeling/latest_model_readiness_report.md \
            data/modeling/latest_model_readiness_report.html
          if git diff --cached --quiet; then
            echo "No registry/report changes to commit"
            exit 0
          fi
          git commit -m "Update model suite registry for run ${{ github.run_id }}"
          git push
