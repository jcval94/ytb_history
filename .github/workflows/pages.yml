name: Deploy Dashboard to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - data/analytics/**
      - data/signals/**
      - data/alerts/**
      - apps/pages_dashboard/**
      - src/ytb_history/services/pages_dashboard_service.py
      - src/ytb_history/services/alerts_service.py
      - src/ytb_history/cli.py
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements.txt

      - name: Compile
        run: python -m compileall src tests

      - name: Validate frontend JavaScript syntax
        run: |
          node --check apps/pages_dashboard/src/assets/app.js
          node --check apps/pages_dashboard/src/assets/charts.js
          node --check apps/pages_dashboard/src/assets/formatters.js
          node --check apps/pages_dashboard/src/assets/tables.js

      - name: Run tests
        run: pytest -q

      - name: Build analytics data mart
        run: python -m ytb_history.cli build-analytics

      - name: Generate alerts and signals
        run: python -m ytb_history.cli generate-alerts

      - name: Build pages dashboard
        run: python -m ytb_history.cli build-pages-dashboard

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check whether GitHub Pages is enabled
        id: pages_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status=$(curl -sS -o /tmp/pages_response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")

          if [ "${status}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "GitHub Pages is enabled for ${GITHUB_REPOSITORY}."
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "GitHub Pages is not enabled (HTTP ${status}). Skipping deployment."
            echo "Enable Pages at https://github.com/${GITHUB_REPOSITORY}/settings/pages"
          fi

      - name: Deploy to GitHub Pages
        if: steps.pages_check.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
