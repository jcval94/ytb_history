name: Deploy Dashboard to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - data/analytics/**
      - apps/pages_dashboard/**
      - src/ytb_history/services/pages_dashboard_service.py
      - src/ytb_history/cli.py
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements.txt

      - name: Compile
        run: python -m compileall src tests

      - name: Run tests
        run: pytest -q

      - name: Build analytics data mart
        run: python -m ytb_history.cli build-analytics

      - name: Build pages dashboard
        run: python -m ytb_history.cli build-pages-dashboard

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
