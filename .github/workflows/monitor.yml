name: YouTube Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'

permissions:
  contents: write

concurrency:
  group: youtube-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements.txt

      - name: Compile
        run: python -m compileall src tests

      - name: Validate frontend JavaScript syntax
        run: |
          node --check apps/pages_dashboard/src/assets/app.js
          node --check apps/pages_dashboard/src/assets/charts.js
          node --check apps/pages_dashboard/src/assets/formatters.js
          node --check apps/pages_dashboard/src/assets/tables.js

      - name: Run tests
        run: pytest -q

      - name: Dry run
        run: python -m ytb_history.cli dry-run

      - name: Run monitor pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python -m ytb_history.cli run

      - name: Validate latest run
        run: python -m ytb_history.cli validate-latest

      - name: Export latest run
        run: python -m ytb_history.cli export-latest

      - name: Build analytics data mart
        run: python -m ytb_history.cli build-analytics

      - name: Build NLP feature layer
        run: python -m ytb_history.cli build-nlp-features

      - name: Generate alerts and signals
        run: python -m ytb_history.cli generate-alerts

      - name: Build decision intelligence layer
        run: python -m ytb_history.cli build-decision-layer

      - name: Build model intelligence
        run: python -m ytb_history.cli build-model-intelligence

      - name: Build topic intelligence
        run: python -m ytb_history.cli build-topic-intelligence

      - name: Generate weekly brief
        run: python -m ytb_history.cli generate-weekly-brief

      - name: Commit and push data changes
        run: |
          git config user.name "youtube-tracker-bot"
          git config user.email "youtube-tracker-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update YouTube tracking data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
