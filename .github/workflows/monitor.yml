name: YouTube Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * *'

permissions:
  contents: write

concurrency:
  group: youtube-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements.txt

      - name: Compile
        run: python -m compileall src tests

      - name: Validate frontend JavaScript syntax
        run: |
          node --check apps/pages_dashboard/src/assets/app.js
          node --check apps/pages_dashboard/src/assets/charts.js
          node --check apps/pages_dashboard/src/assets/formatters.js
          node --check apps/pages_dashboard/src/assets/tables.js

      - name: Run tests
        run: pytest -q

      - name: Dry run
        run: python -m ytb_history.cli dry-run

      - name: Run monitor pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python -m ytb_history.cli run

      - name: Validate latest run
        run: python -m ytb_history.cli validate-latest

      - name: Export latest run
        run: python -m ytb_history.cli export-latest

      - name: Build analytics data mart
        run: python -m ytb_history.cli build-analytics

      - name: Build NLP feature layer
        run: python -m ytb_history.cli build-nlp-features

      - name: Generate alerts and signals
        run: python -m ytb_history.cli generate-alerts

      - name: Build decision intelligence layer
        run: python -m ytb_history.cli build-decision-layer

      - name: Select transcription candidates (daily top + forced channels)
        run: python -m ytb_history.cli select-transcription-candidates --data-dir data --limit 10

      - name: Install yt-dlp
        run: python -m pip install yt-dlp

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Validate yt-dlp availability
        run: yt-dlp --version

      - name: Validate ffmpeg availability
        run: ffmpeg -version

      - name: Prepare yt-dlp cookies file (optional)
        shell: bash
        env:
          YTDLP_COOKIES_TXT: ${{ secrets.YTDLP_COOKIES_TXT }}
        run: |
          COOKIES_PATH="${{ runner.temp }}/yt_cookies.txt"
          if [ -n "${YTDLP_COOKIES_TXT}" ]; then
            printf "%s" "${YTDLP_COOKIES_TXT}" > "${COOKIES_PATH}"
            chmod 600 "${COOKIES_PATH}"
            echo "YTDLP_COOKIES_FILE=${COOKIES_PATH}" >> "${GITHUB_ENV}"
            echo "Prepared temporary yt-dlp cookies file at ${COOKIES_PATH}."
          else
            echo "::warning::Secret YTDLP_COOKIES_TXT not configured. Continuing without cookies file (yt-dlp fallback behavior remains active)."
            echo "YTDLP_COOKIES_FILE=" >> "${GITHUB_ENV}"
          fi

      - name: Run transcription queue (idempotent)
        if: ${{ success() }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          CMD="python -m ytb_history.cli transcribe-selected-videos --data-dir data --limit 10 --audio-source-dir data/audio_sources"
          if [ -n "${YTDLP_COOKIES_FILE}" ]; then
            CMD="${CMD} --ytdlp-cookies-file ${YTDLP_COOKIES_FILE}"
          else
            echo "::warning::No temporary yt-dlp cookies file found. Running transcription queue without --ytdlp-cookies-file."
          fi
          eval "${CMD}"

      - name: Generate transcript insights
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m ytb_history.cli generate-transcript-insights --data-dir data --limit 10

      - name: Build transcript registry report
        run: python -m ytb_history.cli transcript-registry-report --data-dir data

      - name: Build model intelligence
        run: python -m ytb_history.cli build-model-intelligence

      - name: Build topic intelligence
        run: python -m ytb_history.cli build-topic-intelligence

      - name: Generate creative packages
        run: python -m ytb_history.cli generate-creative-packages

      - name: Generate weekly brief
        run: python -m ytb_history.cli generate-weekly-brief

      - name: Cleanup temporary yt-dlp cookies file
        if: ${{ always() }}
        shell: bash
        run: |
          COOKIES_PATH="${{ runner.temp }}/yt_cookies.txt"
          if [ -f "${COOKIES_PATH}" ]; then
            rm -f "${COOKIES_PATH}"
            echo "Removed temporary yt-dlp cookies file."
          else
            echo "No temporary yt-dlp cookies file to remove."
          fi

      - name: Commit and push data changes
        run: |
          git config user.name "youtube-tracker-bot"
          git config user.email "youtube-tracker-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update YouTube tracking data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
